<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>DBD OCR Debug</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
      margin: 20px;
    }
    h1 { margin-top: 0; }
    .topbar {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    button {
      font-size: 16px;
      padding: 8px 12px;
      border-radius: 8px;
      border: 0;
      cursor: pointer;
    }
    .pill {
      background: #1b1b1b;
      border-radius: 10px;
      padding: 8px 12px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .card {
      background: #1b1b1b;
      border-radius: 12px;
      padding: 14px;
    }
    img {
      max-width: 100%;
      border: 1px solid #333;
      background: #000;
    }
    .history-entry {
      padding: 8px 0;
      border-bottom: 1px solid #2a2a2a;
    }
  </style>
</head>
<body>
  <h1>DBD OCR Debug</h1>

  <div class="topbar">
    <button id="checkBtn">Check map</button>
    <div class="pill" id="sourceInfo">Source: none</div>
    <div class="pill" id="autoInfo">Mode: idle • Bar: no • Continue: no</div>
  </div>

  <div class="card" style="margin-bottom:20px;">
    <h2>History</h2>
    <div id="historyList">No detections yet.</div>
  </div>

  <div class="card" style="margin-bottom:20px;">
    <h2>full screen raw</h2>
    <img src="/debug/full_raw.png?t=" id="fullraw">
  </div>

  <div class="grid">
    <div class="card">
      <h2>loading_strip raw</h2>
      <img src="/debug/loading_strip_raw.png?t=" id="lsraw">
    </div>
    <div class="card">
      <h2>loading_strip ocr</h2>
      <img src="/debug/loading_strip_ocr.png?t=" id="lsocr">
    </div>

    <div class="card">
      <h2>tab_map_name raw</h2>
      <img src="/debug/tab_map_name_raw.png?t=" id="tmraw">
    </div>
    <div class="card">
      <h2>tab_map_name ocr</h2>
      <img src="/debug/tab_map_name_ocr.png?t=" id="tmocr">
    </div>

    <div class="card">
      <h2>continue_button raw</h2>
      <img src="/debug/continue_button_raw.png?t=" id="craw">
    </div>
    <div class="card">
      <h2>continue_button ocr</h2>
      <img src="/debug/continue_button_ocr.png?t=" id="cocr">
    </div>

    <div class="card">
      <h2>loading_bar_probe raw</h2>
      <img src="/debug/loading_bar_probe_raw.png?t=" id="lbraw">
    </div>
  </div>

  <script>
    const sourceInfo = document.getElementById("sourceInfo");
    const autoInfo = document.getElementById("autoInfo");
    const historyList = document.getElementById("historyList");
    const checkBtn = document.getElementById("checkBtn");

    const sourceNames = {
      tab_map_name: "tab/details text",
      loading_strip: "loading banner"
    };

    function yesNo(v) {
      return v ? "yes" : "no";
    }

    function formatTime(ts) {
      return new Date(ts * 1000).toLocaleTimeString();
    }

    function renderHistory(history) {
      if (!history || !history.length) {
        historyList.innerHTML = "No detections yet.";
        return;
      }

      historyList.innerHTML = history.map(item => {
        const when = formatTime(item.time);
        const src = item.source_name ? (sourceNames[item.source_name] || item.source_name) : "unknown";
        if (item.type === "match") {
          return `<div class="history-entry">[${when}] ${src} → <strong>${item.map_name}</strong> (${Math.round(item.score)})<br>${item.raw_text || ""}</div>`;
        }
        if (item.type === "clear") {
          return `<div class="history-entry">[${when}] cleared overlay</div>`;
        }
        return `<div class="history-entry">[${when}] ${item.type}</div>`;
      }).join("");
    }

    async function refreshJson() {
      try {
        const res = await fetch("/current_map.json?t=" + Date.now(), { cache: "no-store" });
        if (!res.ok) return;

        const data = await res.json();
        const auto = data.automation || {};

        sourceInfo.textContent = data.source_name
          ? `Source: ${sourceNames[data.source_name] || data.source_name}`
          : "Source: none";

        autoInfo.textContent =
          `Mode: ${auto.mode || "idle"} • Bar: ${yesNo(auto.loading_bar_detected)} • Continue: ${yesNo(auto.continue_detected)}`;

        renderHistory(data.history || []);
      } catch {}
    }

    function refreshImages() {
      const t = Date.now();
      for (const id of ["fullraw","lsraw","lsocr","tmraw","tmocr","craw","cocr","lbraw"]) {
        const img = document.getElementById(id);
        img.src = img.src.split("?")[0] + "?t=" + t;
      }
    }

    checkBtn.addEventListener("click", async () => {
      await fetch("/force_check?t=" + Date.now(), { cache: "no-store" });
      setTimeout(refreshJson, 150);
    });

    setInterval(() => {
      refreshJson();
      refreshImages();
    }, 1000);

    refreshJson();
    refreshImages();
  </script>
</body>
</html>
