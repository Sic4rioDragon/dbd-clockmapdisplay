<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>DBD Map Overlay</title>
  <style>
    :root {
      --panel-bg: rgba(10, 12, 16, 0.78);
      --panel-border: rgba(255, 255, 255, 0.08);
      --text: #f3f5f7;
      --muted: #b6bec8;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: var(--text);
    }

    #wrap {
      position: relative;
      width: 100%;
      height: 100%;
      padding: 18px;
    }

    #mapLayer {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 70px 120px 70px 120px;
      pointer-events: none;
    }

    #map {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: none;
      filter: drop-shadow(0 12px 30px rgba(0, 0, 0, 0.35));
    }

    .panel {
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(6px);
    }

    #statusPanel {
      position: absolute;
      left: 18px;
      bottom: 18px;
      width: 560px;
      max-width: calc(100% - 36px);
      padding: 14px 16px;
    }

    #statusTitle {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    #status {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.3;
    }

    #automationLine {
      margin-top: 8px;
      font-size: 13px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div id="wrap">
    <div id="mapLayer">
      <img id="map" src="" alt="">
    </div>

    <div id="statusPanel" class="panel">
      <div id="statusTitle">Status</div>
      <div id="status">Starting…</div>
      <div id="automationLine">Mode: idle • Bar: no • Continue: no</div>
    </div>
  </div>

  <script>
    const mapImg = document.getElementById("map");
    const statusEl = document.getElementById("status");
    const automationEl = document.getElementById("automationLine");
    let lastUpdatedAt = 0;

    function yesNo(v) {
      return v ? "yes" : "no";
    }

    async function refresh() {
      try {
        const res = await fetch("/current_map.json?t=" + Date.now(), { cache: "no-store" });
        if (!res.ok) throw new Error("current_map.json not reachable");

        const data = await res.json();
        const auto = data.automation || {};

        statusEl.textContent = data.status || "Running...";
        automationEl.textContent =
          `Mode: ${auto.mode || "idle"} • Bar: ${yesNo(auto.loading_bar_detected)} • Continue: ${yesNo(auto.continue_detected)}`;

        if (!data.image_url) {
          mapImg.style.display = "none";
          return;
        }

        if (data.updated_at !== lastUpdatedAt) {
          mapImg.src = data.image_url + "?t=" + data.updated_at;
          lastUpdatedAt = data.updated_at;
        }

        mapImg.style.display = "block";
      } catch (e) {
        statusEl.textContent = "Overlay fetch error: " + e.message;
      }
    }

    setInterval(refresh, 500);
    refresh();
  </script>
</body>
</html>
